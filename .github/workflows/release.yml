name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec rspec spec/conductor/ --format documentation

      - name: Verify version in code
        run: |
          CODE_VERSION=$(ruby -Ilib -e "require 'conductor/version'; puts Conductor::VERSION")
          echo "Version in code: $CODE_VERSION"
          echo "Expected version: ${{ steps.version.outputs.version }}"
          if [ "$CODE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Version mismatch! Code has $CODE_VERSION but releasing ${{ steps.version.outputs.version }}"
            exit 1
          fi

  build:
    name: Build Gem
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build gem
        run: gem build conductor_ruby.gemspec

      - name: Verify gem
        run: |
          gem install conductor_ruby-*.gem --local
          ruby -e "require 'conductor'; puts 'Gem loads successfully!'"

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: conductor_ruby-${{ needs.verify.outputs.version }}
          path: "*.gem"

  publish-rubygems:
    name: Publish to RubyGems
    needs: [verify, build]
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: conductor_ruby-${{ needs.verify.outputs.version }}

      - name: Configure RubyGems credentials
        run: |
          mkdir -p ~/.gem
          cat << EOF > ~/.gem/credentials
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          EOF
          chmod 600 ~/.gem/credentials

      - name: Publish to RubyGems
        run: |
          gem push conductor_ruby-${{ needs.verify.outputs.version }}.gem

      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.gem/credentials

  publish-github:
    name: Publish to GitHub Packages
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: conductor_ruby-${{ needs.verify.outputs.version }}

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gem
          cat << EOF > ~/.gem/credentials
          ---
          :github: Bearer ${{ secrets.GITHUB_TOKEN }}
          EOF
          chmod 600 ~/.gem/credentials

      - name: Publish to GitHub Packages
        run: |
          gem push --key github \
            --host https://rubygems.pkg.github.com/${{ github.repository_owner }} \
            conductor_ruby-${{ needs.verify.outputs.version }}.gem
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.gem/credentials

  upload-release-assets:
    name: Upload Release Assets
    needs: [verify, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: conductor_ruby-${{ needs.verify.outputs.version }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.gem"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
