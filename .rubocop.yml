require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'examples/**/*'  # Examples are meant to be simple scripts
    - 'test_basic.rb'  # Simple test script

Style/Documentation:
  Enabled: false

# Examples use top-level include for readability
Style/MixinUsage:
  Exclude:
    - 'examples/**/*'

# Metrics settings
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

Metrics/MethodLength:
  Max: 80
  Exclude:
    - 'examples/**/*'

Metrics/ClassLength:
  Max: 400

Metrics/AbcSize:
  Max: 70
  Exclude:
    - 'examples/**/*'

Metrics/CyclomaticComplexity:
  Max: 35

Metrics/PerceivedComplexity:
  Max: 40

# Some API methods need many parameters to match the API
Metrics/ParameterLists:
  Max: 8
  CountKeywordArgs: false

Layout/LineLength:
  Max: 160
  Exclude:
    - 'spec/**/*'

# API method names follow Conductor/Orkes API conventions
Naming/AccessorMethodName:
  Enabled: false

# Short parameter names are acceptable for callbacks
Naming/MethodParameterName:
  MinNameLength: 1

# Script permissions are not relevant for gem distribution
Lint/ScriptPermission:
  Enabled: false

# Variable naming in tests (e.g., task_def_1, task_def_2)
Naming/VariableNumber:
  Exclude:
    - 'spec/**/*'

# Allow shadowing in rspec blocks for error handling
Lint/ShadowingOuterLocalVariable:
  Exclude:
    - 'spec/**/*'

# Allow constant definition in rspec blocks for test helpers
Lint/ConstantDefinitionInBlock:
  Exclude:
    - 'spec/**/*'

# Model classes use attribute accessors instead of super
Lint/MissingSuper:
  Exclude:
    - 'lib/conductor/http/models/**/*'
    - 'lib/conductor/workflow/**/*'
    - 'lib/conductor/orkes/models/**/*'

# Predicate methods may have is_ prefix to match API conventions
Naming/PredicateName:
  Enabled: false

# Unused assignments in rescue blocks are intentional
Lint/UselessAssignment:
  Exclude:
    - 'lib/**/*'

# Unused arguments in overridable methods are intentional
Lint/UnusedMethodArgument:
  Enabled: false

# Duplicate branches are acceptable in case statements for clarity
Lint/DuplicateBranch:
  Enabled: false

# Module-level method visibility is intentional
Lint/IneffectiveAccessModifier:
  Enabled: false

# Early returns in iterators are intentional
Lint/NonLocalExitFromIterator:
  Enabled: false

# Some methods return nil in rescue blocks intentionally
Lint/NoReturnInBeginEndBlocks:
  Enabled: false

# RSpec configuration
RSpec/ExampleLength:
  Max: 100
  Exclude:
    - 'spec/integration/**/*'

RSpec/MultipleExpectations:
  Max: 20
  Exclude:
    - 'spec/integration/**/*'

RSpec/NestedGroups:
  Max: 6

RSpec/MultipleMemoizedHelpers:
  Max: 20

RSpec/InstanceVariable:
  Exclude:
    - 'spec/integration/**/*'

RSpec/LetSetup:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

RSpec/AnyInstance:
  Enabled: false

RSpec/BeforeAfterAll:
  Exclude:
    - 'spec/integration/**/*'

RSpec/ExpectActual:
  Exclude:
    - 'spec/integration/**/*'

RSpec/IdenticalEqualityAssertion:
  Exclude:
    - 'spec/integration/**/*'

RSpec/RepeatedExample:
  Enabled: false

RSpec/RepeatedExampleGroupBody:
  Enabled: false

RSpec/RepeatedExampleGroupDescription:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

RSpec/IteratedExpectation:
  Enabled: false

RSpec/LeakyConstantDeclaration:
  Exclude:
    - 'spec/integration/**/*'

RSpec/BeEq:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/FilePath:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false
