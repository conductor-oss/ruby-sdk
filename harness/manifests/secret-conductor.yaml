# Conductor API Secret
# This secret contains the Conductor AUTH SECRET for authentication.
# The auth key (key ID) is NOT secret and lives in the per-cloud ConfigMap.
# Create this secret before deploying the worker.

apiVersion: v1
kind: Secret
metadata:
  name: conductor-credentials
  # namespace: xxxxx # supply this in kubectl command
  labels:
    app: ruby-sdk-harness-worker
type: Opaque
stringData:
  # TODO: Replace with your actual Conductor AUTH SECRET (not the key ID)
  auth-secret: "YOUR_CONDUCTOR_AUTH_SECRET_HERE"

---
# Instructions for creating this secret:
#
# Option 1 - kubectl imperative command (recommended):
#
#   kubectl create secret generic conductor-credentials \
#     --from-literal=auth-secret=YOUR_AUTH_SECRET \
#     -n $NS
#
# Option 2 - edit this file and apply:
#
#   1. Replace YOUR_CONDUCTOR_AUTH_SECRET_HERE with the real secret value
#   2. kubectl apply -f manifests/secret-conductor.yaml -n $NS
#
# Note: The auth key (key ID) is not secret and is stored in the per-cloud
# ConfigMap (configmap-aws.yaml, configmap-azure.yaml, configmap-gcp.yaml).
#
# Note: If the e2e-testrunner-worker already runs in the same namespace, the
# conductor-credentials secret may already exist and can be reused as-is
# (same credential, same secret name).
